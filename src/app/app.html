<div class="app-shell" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)">
  <app-toolbar
    [filePath]="filePath()"
    [totalRowCount]="totalRowCount()"
    [delimiterForm]="delimiterForm"
    [delimiterKind]="delimiterKind()"
    (pickFile)="pickFile()"
    (clearFile)="clearFile()"
  />

  @if (appError(); as errorMessage) {
    <div class="banner banner-error" role="alert">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="banner-icon">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span class="error-text">{{ errorMessage }}</span>
    </div>
  }

  <main class="content">
    @if (isLoading() || !fileContent()) {
      <app-state-panel [isLoading]="isLoading()" />
    } @else {
      <app-grid-view [headers]="tableHeaders()" [rows]="tableRows()" />
    }
  </main>

  @if (isDragging()) {
    <div class="drag-overlay">
      <div class="drag-overlay-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="drag-icon">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <span class="drag-overlay-text">{{ ts.t().dropOverlay }}</span>
      </div>
    </div>
  }
</div>
